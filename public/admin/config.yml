backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "content"
    label: "Site Content"
    files:
      - name: "shows"
        label: "Upcoming Shows"
        file: "public/data/shows.json"
        fields:
          - label: "Shows"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "string", hint: "Format: Month Day Year (e.g. July 13 2025)" }
              - { label: "Venue", name: "venue", widget: "string" }
              - { label: "Time", name: "time", widget: "string" }
              - { label: "Poster", name: "poster", widget: "image" }

      - name: "gallery"
        label: "Gallery"
        file: "public/data/gallery.json"
        fields:
          - label: "Images"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "src", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }

      - name: "past-performances"
        label: "Past Performances"
        file: "public/data/past-performances.json"
        fields:
          - label: "Performances"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "YouTube Link", name: "youtube", widget: "string", required: false, hint: "Full YouTube URL (e.g. https://youtube.com/watch?v=...)" }
              - { label: "Poster Image", name: "poster", widget: "image", required: false }
